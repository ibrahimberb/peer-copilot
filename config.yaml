# Peer Copilot Configuration
# Edit this file to configure your LLM provider and settings

# LLM Provider Configuration
llm:
  # Provider type: "lm_studio" for local, "openai" for OpenAI API
  provider: lm_studio
  
  # Model name to use
  # For LM Studio: Use the full model name as shown in LM Studio (e.g., "openai/gpt-oss-20b")
  # For OpenAI: Use model ID (e.g., "gpt-4", "gpt-3.5-turbo")
  model: openai/gpt-oss-20b

# LM Studio Configuration (for local models)
lm_studio:
  base_url: http://127.0.0.1:1234

# OpenAI Configuration (for cloud API)
openai:
  base_url: https://api.openai.com/v1

# API Endpoints (OpenAI-compatible format)
endpoints:
  chat: /v1/chat/completions
  models: /v1/models
  completions: /v1/completions
  embeddings: /v1/embeddings

# Generation Parameters
generation:
  # Maximum tokens to generate (-1 for unlimited, recommended for LM Studio)
  max_tokens: -1
  
  # Temperature controls randomness (0.0 = deterministic, 1.0 = creative)
  temperature: 0.7
  
  # Top-p sampling parameter
  top_p: 1.0
  
  # Enable streaming responses
  stream: false

# Connection Settings
connection:
  # Request timeout in seconds
  timeout: 60

# Application Settings
app:
  # Temporary upload folder
  temp_folder: temp_uploads
  
  # Demo files folder
  demo_folder: demo
