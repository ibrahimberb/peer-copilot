llm:
  provider: openai
  model: gpt-4o-mini
lm_studio:
  base_url: http://127.0.0.1:1234
  endpoints:
    chat: /v1/chat/completions
    models: /v1/models
    completions: /v1/completions
    embeddings: /v1/embeddings
openai:
  base_url: https://api.openai.com/v1
  endpoints:
    chat: /chat/completions
    models: /models
    completions: /completions
    embeddings: /embeddings
generation:
  max_tokens: 4096
  temperature: 0.1
  top_p: 1.0
  stream: false
connection:
  timeout: 60
app:
  temp_folder: temp_uploads
  demo_folder: demo
models:
  gpt-4o-mini:
    token_param: max_tokens
    temperature: 0.1
  gpt-4o:
    token_param: max_tokens
    temperature: 0.1
  gpt-5-nano:
    token_param: max_completion_tokens
    temperature: 1
  gpt-5-mini:
    token_param: max_completion_tokens
    temperature: 1
  gpt-5:
    token_param: max_completion_tokens
    temperature: 1
  gpt-5.2:
    token_param: max_completion_tokens
    temperature: 1
  openai/gpt-oss-20b:
    token_param: max_tokens
    temperature: 0.1
  llama-3.1-8b:
    token_param: max_tokens
    temperature: 0.1
  mistral-7b:
    token_param: max_tokens
    temperature: 0.1
  deepseek-chat:
    token_param: max_tokens
    temperature: 0.1
  deepseek-coder:
    token_param: max_tokens
    temperature: 0.1
  qwen-turbo:
    token_param: max_tokens
    temperature: 0.1
  qwen-plus:
    token_param: max_tokens
    temperature: 0.1
