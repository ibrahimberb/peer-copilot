llm:
  provider: openai
  model: gpt-5.1
lm_studio:
  base_url: http://127.0.0.1:1234
openai:
  base_url: https://api.openai.com/v1
endpoints:
  chat: /v1/chat/completions
  models: /v1/models
  completions: /v1/completions
  embeddings: /v1/embeddings
generation:
  max_tokens: -1
  temperature: 0.7
  top_p: 1.0
  stream: false
connection:
  timeout: 60
app:
  temp_folder: temp_uploads
  demo_folder: demo
